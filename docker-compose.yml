# Docker Compose — LLM RAG Exam Grading
#
# Sprint 1: Qdrant only (backend + frontend run locally)
#   docker compose up -d
#
# Sprint 4: Full stack (after Dockerfiles are ready)
#   docker compose --profile full up -d

services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: rag_qdrant
    ports:
      - "6333:6333"   # REST API + Web UI  → http://localhost:6333/dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Uncomment below in Sprint 4 after Dockerfiles are ready ──────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override QDRANT_HOST to use Docker service name instead of localhost
      QDRANT_HOST: qdrant
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface   # persist BGE-M3 model download
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["full"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    profiles: ["full"]

volumes:
  qdrant_storage:
  model_cache:    # shared BGE-M3 model cache across rebuilds
